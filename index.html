<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#20382c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <title>Readi World v0.0.4b</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#102019;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none}
    #app{position:relative;width:100%;height:100%;min-height:100dvh;background:#789f68}
    canvas{display:block;width:100%;height:100%}
    .top{position:absolute;top:calc(10px + env(safe-area-inset-top));left:calc(10px + env(safe-area-inset-left));right:calc(10px + env(safe-area-inset-right));display:grid;grid-template-columns:auto 1fr auto;gap:8px;color:#fff;pointer-events:none}
    .card,.menu{background:rgba(30,51,39,.92);border:1px solid rgba(255,255,255,.18);border-radius:20px;box-shadow:0 10px 22px rgba(0,0,0,.2);backdrop-filter:blur(8px)}
    .profile{display:flex;align-items:center;gap:8px;padding:8px 10px}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#b97d48;border:2px solid #efcf7c;font-size:22px}.meta{font-size:12px}.meta strong{display:block;font-size:14px}
    .center{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 10px}.resources{display:flex;gap:6px;overflow:hidden}.res{white-space:nowrap;padding:5px 7px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:13px}.time{text-align:right;white-space:nowrap}.time strong{display:block;font-size:14px}.time span{font-size:11px;color:#d6ded5}
    .menu{width:54px;color:#fff;font-size:22px;pointer-events:auto}
    #prompt{position:absolute;top:calc(108px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:10px 15px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(30,51,39,.92);color:#fff;font-weight:700;opacity:0;pointer-events:auto;transition:.15s}
    #prompt.show{opacity:1}
    #toast{position:absolute;bottom:calc(120px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);padding:9px 13px;border-radius:999px;background:rgba(30,51,39,.94);color:#fff;font-weight:700;opacity:0;transition:.18s}
    #toast.show{opacity:1}
    #joy{position:absolute;width:118px;height:118px;border-radius:50%;background:rgba(30,51,39,.4);border:1px solid rgba(255,255,255,.18);display:none;pointer-events:none}
    #joy.show{display:block}#knob{position:absolute;left:33px;top:33px;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.78)}
    #panel{position:absolute;top:calc(82px + env(safe-area-inset-top));right:calc(10px + env(safe-area-inset-right));width:min(88vw,330px);padding:14px;display:none;background:rgba(30,51,39,.96);border:1px solid rgba(255,255,255,.18);border-radius:20px;color:#fff}
    #panel.open{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.item{min-height:68px;border-radius:14px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);color:#fff;text-align:left;padding:10px}
    #loading{position:absolute;inset:0;display:grid;place-items:center;background:#102019;color:#fff;font-size:18px;z-index:20}
    #loading.hidden{display:none}
  </style>
</head>
<body>
<main id="app">
  <canvas id="game"></canvas>
  <div id="loading">Loading Readi World…</div>
  <div class="top">
    <div class="card profile"><div class="avatar">🧑🏻</div><div class="meta"><strong>Player</strong>Lv. 3</div></div>
    <div class="card center">
      <div class="resources"><span class="res">🪵 <b id="wood">0</b></span><span class="res">🪨 <b id="stone">0</b></span><span class="res">🪙 <b id="coin">25</b></span></div>
      <div class="time"><strong id="phase">☀️ Morning</strong><span id="clock">Day 1 · 08:30</span></div>
    </div>
    <button class="menu" id="menu">☰</button>
  </div>
  <button id="prompt">Enter Home</button>
  <div id="toast"></div>
  <div id="joy"><div id="knob"></div></div>
  <aside id="panel">
    <div class="grid">
      <button class="item" data-a="save">Save now</button>
      <button class="item" data-a="inventory">Inventory</button>
      <button class="item" data-a="village">Village</button>
      <button class="item" data-a="settings">Settings</button>
    </div>
  </aside>
</main>

<script>
"use strict";

const CONFIG={
  logicalWidth:720,logicalHeight:1280,maxPixelRatio:2,
  speed:220,interactionRange:90,harvestRange:68,
  dayCycleMs:4*60*60*1000,phaseDurationMs:60*60*1000,
  saveKey:"readiWorld_v004"
};

const PATHS={
  layout:"./data/village_layout.json",
  registry:"./data/sprite_registry.json",
  buildings:"./assets/buildings/village_buildings.png"
};

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d",{alpha:false});
const ui={
  loading:document.getElementById("loading"),wood:document.getElementById("wood"),
  stone:document.getElementById("stone"),coin:document.getElementById("coin"),
  phase:document.getElementById("phase"),clock:document.getElementById("clock"),
  menu:document.getElementById("menu"),panel:document.getElementById("panel"),
  prompt:document.getElementById("prompt"),toast:document.getElementById("toast"),
  joy:document.getElementById("joy"),knob:document.getElementById("knob")
};

const phases=[
  {name:"Morning",icon:"☀️",overlay:"rgba(255,220,150,.06)",base:6},
  {name:"Afternoon",icon:"🌤️",overlay:"rgba(255,255,255,0)",base:12},
  {name:"Evening",icon:"🌇",overlay:"rgba(221,113,65,.15)",base:18},
  {name:"Night",icon:"🌙",overlay:"rgba(15,32,58,.38)",base:22}
];

const FALLBACK_LAYOUT={
  worldSize:{width:1344,height:1920},
  playerSpawn:{x:672,y:930,direction:"up"},
  buildings:[
    {id:"building.forester_hut",spriteId:"forester_hut_lv1",position:{x:360,y:430},collisionRadius:68,clearRadius:165,interactionPoint:{x:360,y:500},interactionLabel:"Visit Forester's Hut"},
    {id:"building.mine",spriteId:"mine_entrance_locked",position:{x:980,y:380},collisionRadius:72,clearRadius:170,interactionPoint:{x:940,y:490},interactionLabel:"Inspect Mine"},
    {id:"building.home",spriteId:"home_lv1",position:{x:820,y:900},collisionRadius:80,clearRadius:185,interactionPoint:{x:820,y:1000},interactionLabel:"Enter Home"},
    {id:"building.farm",spriteId:"farm_lv1",position:{x:330,y:1260},collisionRadius:76,clearRadius:180,interactionPoint:{x:400,y:1340},interactionLabel:"Visit Farm"},
    {id:"building.well",spriteId:"village_well",position:{x:760,y:1280},collisionRadius:40,clearRadius:100,interactionPoint:{x:760,y:1345},interactionLabel:"Use Village Well"},
    {id:"building.harbor",spriteId:"harbor_locked",position:{x:900,y:1680},collisionRadius:95,clearRadius:220,interactionPoint:{x:900,y:1780},interactionLabel:"Inspect Harbor"}
  ],
  paths:[
    {id:"path.main",width:64,points:[{x:470,y:220},{x:620,y:560},{x:700,y:930},{x:600,y:1250},{x:830,y:1640}]},
    {id:"path.mine_branch",width:54,points:[{x:620,y:560},{x:980,y:420}]},
    {id:"path.home_branch",width:50,points:[{x:700,y:930},{x:820,y:980}]},
    {id:"path.farm_branch",width:50,points:[{x:600,y:1250},{x:360,y:1320}]}
  ],
  water:[
    {id:"water.harbor_bay",polygon:[{x:540,y:1660},{x:1344,y:1500},{x:1344,y:1920},{x:0,y:1920},{x:0,y:1810}]}
  ]
};

function validLayout(layout){
  return !!layout &&
    Array.isArray(layout.buildings) && layout.buildings.length >= 6 &&
    Array.isArray(layout.paths) && layout.paths.length > 0 &&
    Array.isArray(layout.water);
}

function createHarvestTrees(){
  const trees=[];
  const buildings=state.layout?.buildings||[];
  for(let i=0;i<44;i++){
    const x=70+((i*173)%1200);
    const y=120+((i*257)%1680);
    const blockedByBuilding=buildings.some(b=>Math.hypot(x-b.position.x,y-b.position.y)<(b.clearRadius||140)+22);
    const blockedByPath=(state.layout?.paths||[]).some(path=>{
      for(let j=1;j<path.points.length;j++){
        const a=path.points[j-1],b=path.points[j];
        const vx=b.x-a.x,vy=b.y-a.y;
        const wx=x-a.x,wy=y-a.y;
        const c1=vx*wx+vy*wy;
        const c2=vx*vx+vy*vy;
        const t=Math.max(0,Math.min(1,c2?c1/c2:0));
        const px=a.x+t*vx,py=a.y+t*vy;
        if(Math.hypot(x-px,y-py)<(path.width||50)*0.75)return true;
      }
      return false;
    });
    if(!blockedByBuilding&&!blockedByPath){
      trees.push({id:`tree.${i}`,x,y,state:"active",respawnAt:0});
    }
  }
  state.trees=trees;
}



const state={
  layout:null,registry:null,buildingImage:null,
  world:{width:1344,height:1920},
  player:{x:672,y:930,direction:"up",moving:false},
  camera:{x:0,y:0},resources:{wood:0,stone:0,coin:25},
  input:{pointerId:null,startX:0,startY:0,x:0,y:0},
  context:null,gameTimeAnchor:Date.now(),last:performance.now(),
  fallback:false,toastTimer:null,trees:[],harvesting:null
};

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function showToast(t){ui.toast.textContent=t;ui.toast.classList.add("show");clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>ui.toast.classList.remove("show"),1400)}
function save(){localStorage.setItem(CONFIG.saveKey,JSON.stringify({player:state.player,resources:state.resources,gameTimeAnchor:state.gameTimeAnchor}))}
function loadSave(){try{const d=JSON.parse(localStorage.getItem(CONFIG.saveKey));if(!d)return;Object.assign(state.player,d.player||{});Object.assign(state.resources,d.resources||{});state.gameTimeAnchor=d.gameTimeAnchor||Date.now()}catch{}}

async function fetchJson(url){
  const r=await fetch(url,{cache:"no-store"});
  if(!r.ok)throw new Error(`${url}: ${r.status}`);
  return r.json();
}
function loadImage(url){
  return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=()=>reject(new Error(`Image failed: ${url}`));img.src=url+"?v=4b";});
}

function resize(){
  const r=canvas.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,CONFIG.maxPixelRatio);
  canvas.width=Math.round(r.width*d);canvas.height=Math.round(r.height*d);
}
function beginLogical(){
  const sx=canvas.width/CONFIG.logicalWidth,sy=canvas.height/CONFIG.logicalHeight,s=Math.min(sx,sy);
  ctx.setTransform(s,0,0,s,(canvas.width-CONFIG.logicalWidth*s)/2,(canvas.height-CONFIG.logicalHeight*s)/2);
}

function spriteMeta(id){
  return state.registry?.atlases?.village_buildings?.sprites?.[id]||null;
}
function drawAtlasSprite(id,x,y){
  const atlas=state.registry?.atlases?.village_buildings;
  const m=spriteMeta(id);
  const validImage=state.buildingImage &&
    atlas &&
    state.buildingImage.naturalWidth===atlas.imageWidth &&
    state.buildingImage.naturalHeight===atlas.imageHeight;
  if(!m||!validImage){drawFallbackBuilding(id,x,y);return;}
  const fw=atlas.frameWidth,fh=atlas.frameHeight;
  const [dw,dh]=m.drawSize;
  const [px,py]=m.pivot;
  ctx.drawImage(state.buildingImage,m.col*fw,m.row*fh,fw,fh,x-dw*px,y-dh*py,dw,dh);
}
function drawFallbackBuilding(id,x,y){
  ctx.save();ctx.fillStyle="#a77448";ctx.fillRect(x-80,y-110,160,110);ctx.fillStyle="#8b4f32";ctx.beginPath();ctx.moveTo(x-95,y-110);ctx.lineTo(x,y-170);ctx.lineTo(x+95,y-110);ctx.closePath();ctx.fill();ctx.fillStyle="#4d3428";ctx.fillRect(x-16,y-48,32,48);ctx.restore();
}

function drawGround(){
  ctx.fillStyle="#7ca66b";ctx.fillRect(0,0,CONFIG.logicalWidth,CONFIG.logicalHeight);
  const cx=state.camera.x,cy=state.camera.y;
  for(const p of state.layout.paths||[]){
    ctx.strokeStyle="#d0b67d";ctx.lineWidth=p.width;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();
    p.points.forEach((pt,i)=>i?ctx.lineTo(pt.x-cx,pt.y-cy):ctx.moveTo(pt.x-cx,pt.y-cy));ctx.stroke();
  }
  for(const w of state.layout.water||[]){
    ctx.fillStyle="#5c9fb0";ctx.beginPath();w.polygon.forEach((pt,i)=>i?ctx.lineTo(pt.x-cx,pt.y-cy):ctx.moveTo(pt.x-cx,pt.y-cy));ctx.closePath();ctx.fill();
  }
}

function drawDecor(){
  const cx=state.camera.x,cy=state.camera.y;
  const now=Date.now();
  for(const tree of state.trees){
    if(tree.state==="harvested"&&tree.respawnAt<=now){
      tree.state="active";
      tree.respawnAt=0;
    }
    if(tree.state!=="active")continue;
    const x=tree.x-cx,y=tree.y-cy;
    if(x<-80||y<-100||x>CONFIG.logicalWidth+80||y>CONFIG.logicalHeight+100)continue;
    ctx.fillStyle="#76523d";
    ctx.fillRect(x-7,y-28,14,38);
    ctx.fillStyle=Number(tree.id.split(".")[1])%3?"#4d7d43":"#5c8b50";
    ctx.beginPath();
    ctx.arc(x,y-52,30,0,Math.PI*2);
    ctx.arc(x-22,y-40,22,0,Math.PI*2);
    ctx.arc(x+22,y-40,22,0,Math.PI*2);
    ctx.fill();
  }
}
function drawBuildings(){
  const cx=state.camera.x,cy=state.camera.y;
  const sorted=[...(state.layout.buildings||[])].sort((a,b)=>a.position.y-b.position.y);
  for(const b of sorted)drawAtlasSprite(b.spriteId,b.position.x-cx,b.position.y-cy);
}

function drawPlayer(){
  const x=state.player.x-state.camera.x,y=state.player.y-state.camera.y;
  ctx.fillStyle="rgba(0,0,0,.2)";ctx.beginPath();ctx.ellipse(x,y+5,22,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#3f7880";ctx.fillRect(x-14,y-34,28,30);ctx.fillStyle="#d9a36f";ctx.beginPath();ctx.arc(x,y-49,16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#4b3326";ctx.beginPath();ctx.arc(x,y-54,16,Math.PI,Math.PI*2);ctx.fill();
}

function timeState(){
  const e=Date.now()-state.gameTimeAnchor,c=((e%CONFIG.dayCycleMs)+CONFIG.dayCycleMs)%CONFIG.dayCycleMs,idx=Math.floor(c/CONFIG.phaseDurationMs);
  const min=Math.floor((c%CONFIG.phaseDurationMs)/CONFIG.phaseDurationMs*360),h=(phases[idx].base+Math.floor(min/60))%24;
  return{phase:phases[idx],day:Math.floor(e/CONFIG.dayCycleMs)+1,h,m:min%60};
}

function render(){
  beginLogical();drawGround();drawDecor();drawBuildings();drawPlayer();
  const t=timeState();ctx.fillStyle=t.phase.overlay;ctx.fillRect(0,0,CONFIG.logicalWidth,CONFIG.logicalHeight);
}

function blocked(x,y){
  if(x<30||y<30||x>state.world.width-30||y>state.world.height-30)return true;
  if((state.layout.buildings||[]).some(b=>Math.hypot(x-b.position.x,y-b.position.y)<(b.collisionRadius||60)+18))return true;
  return state.trees.some(tree=>tree.state==="active"&&Math.hypot(x-tree.x,y-tree.y)<38);
}


function nearestHarvestTree(){
  let best=null,bestD=Infinity;
  for(const tree of state.trees){
    if(tree.state!=="active")continue;
    const d=Math.hypot(state.player.x-tree.x,state.player.y-tree.y);
    if(d<CONFIG.harvestRange&&d<bestD){best=tree;bestD=d}
  }
  return best;
}

function updateHarvesting(){
  if(state.harvesting){
    state.input.x=0;
    state.input.y=0;
    if(performance.now()-state.harvesting.startedAt>=900){
      const tree=state.harvesting.tree;
      tree.state="harvested";
      tree.respawnAt=Date.now()+5*60*1000;
      state.resources.wood+=3;
      state.harvesting=null;
      showToast("+3 Wood");
      save();
    }
    return true;
  }
  const tree=nearestHarvestTree();
  if(tree){
    state.harvesting={tree,startedAt:performance.now()};
    showToast("Chopping…");
    return true;
  }
  return false;
}

function update(dt){
  const harvesting=updateHarvesting();
  let x=harvesting?0:state.input.x,y=harvesting?0:state.input.y,l=Math.hypot(x,y);if(l>1){x/=l;y/=l}
  const nx=state.player.x+x*CONFIG.speed*dt,ny=state.player.y+y*CONFIG.speed*dt;
  if(!blocked(nx,state.player.y))state.player.x=nx;if(!blocked(state.player.x,ny))state.player.y=ny;
  const tx=clamp(state.player.x-CONFIG.logicalWidth/2,0,state.world.width-CONFIG.logicalWidth),ty=clamp(state.player.y-CONFIG.logicalHeight/2,0,state.world.height-CONFIG.logicalHeight);
  state.camera.x+=(tx-state.camera.x)*Math.min(1,dt*8);state.camera.y+=(ty-state.camera.y)*Math.min(1,dt*8);

  let best=null,bestD=1e9;
  for(const b of state.layout.buildings||[]){const d=Math.hypot(state.player.x-b.interactionPoint.x,state.player.y-b.interactionPoint.y);if(d<CONFIG.interactionRange&&d<bestD){best=b;bestD=d}}
  state.context=best;ui.prompt.textContent=best?.interactionLabel||"";ui.prompt.classList.toggle("show",!!best);

  const t=timeState();ui.phase.textContent=`${t.phase.icon} ${t.phase.name}`;ui.clock.textContent=`Day ${t.day} · ${String(t.h).padStart(2,"0")}:${String(t.m).padStart(2,"0")}`;
  ui.wood.textContent=state.resources.wood;ui.stone.textContent=state.resources.stone;ui.coin.textContent=state.resources.coin;
}

function loop(now){const dt=Math.min(.05,(now-state.last)/1000);state.last=now;update(dt);render();requestAnimationFrame(loop)}

function logicalPoint(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*CONFIG.logicalWidth,y:(e.clientY-r.top)/r.height*CONFIG.logicalHeight}}
canvas.addEventListener("pointerdown",e=>{
  const p=logicalPoint(e);if(p.y<CONFIG.logicalHeight*.45)return;
  state.input.pointerId=e.pointerId;state.input.startX=e.clientX;state.input.startY=e.clientY;
  ui.joy.style.left=(e.clientX-59)+"px";ui.joy.style.top=(e.clientY-59)+"px";ui.joy.classList.add("show");canvas.setPointerCapture?.(e.pointerId);
});
canvas.addEventListener("pointermove",e=>{
  if(e.pointerId!==state.input.pointerId)return;let dx=e.clientX-state.input.startX,dy=e.clientY-state.input.startY,l=Math.hypot(dx,dy),r=40;if(l>r){dx=dx/l*r;dy=dy/l*r}
  state.input.x=dx/r;state.input.y=dy/r;ui.knob.style.transform=`translate(${dx}px,${dy}px)`;
});
function endJoy(e){if(e.pointerId!==state.input.pointerId)return;state.input.pointerId=null;state.input.x=0;state.input.y=0;ui.joy.classList.remove("show");ui.knob.style.transform="translate(0,0)"}
canvas.addEventListener("pointerup",endJoy);canvas.addEventListener("pointercancel",endJoy);

ui.menu.onclick=()=>ui.panel.classList.toggle("open");
ui.prompt.onclick=()=>state.context&&showToast(`${state.context.interactionLabel} · Coming Soon`);
ui.panel.onclick=e=>{const a=e.target.dataset.a;if(!a)return;if(a==="save"){save();showToast("Game saved.")}else showToast(`${a[0].toUpperCase()+a.slice(1)} · Coming Soon`)};
document.addEventListener("visibilitychange",()=>{if(document.hidden)save()});
window.addEventListener("resize",resize);

async function boot(){
  loadSave();
  const results=await Promise.allSettled([fetchJson(PATHS.layout),fetchJson(PATHS.registry),loadImage(PATHS.buildings)]);
  if(results[0].status==="fulfilled"&&validLayout(results[0].value)){
    state.layout=results[0].value;
  }else{
    state.layout=FALLBACK_LAYOUT;
    state.fallback=true;
  }
  if(results[1].status==="fulfilled")state.registry=results[1].value;else state.fallback=true;
  if(results[2].status==="fulfilled")state.buildingImage=results[2].value;else state.fallback=true;
  state.world=state.layout.worldSize||state.world;
  createHarvestTrees();
  const spawn=state.layout.playerSpawn||{};if(!localStorage.getItem(CONFIG.saveKey)){state.player.x=spawn.x||672;state.player.y=spawn.y||930;state.player.direction=spawn.direction||"up"}
  resize();ui.loading.classList.add("hidden");if(state.fallback)showToast("Asset fallback active.");requestAnimationFrame(loop);
}

boot().catch(err=>{console.error(err);ui.loading.textContent="Failed to load game files. Check data/ and assets/ paths.";});
</script>
</body>
</html>
