<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#15251f" />
  <meta name="background-color" content="#0f1714" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Readi World" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="./manifest.json" />
  <title>Readi World v0.0.1</title>
  <style>
    :root {
      color-scheme: dark;
      --ui-bg: rgba(14, 24, 21, 0.78);
      --ui-border: rgba(255, 255, 255, 0.16);
      --ui-text: #f4f7f3;
      --ui-muted: #b7c2bc;
      --accent: #d8b56b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1714;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    body {
      padding: 0;
      overscroll-behavior: none;
    }

    #game-shell {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #263d32;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: var(--ui-text);
    }

    .topbar {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      left: calc(12px + env(safe-area-inset-left));
      right: calc(12px + env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .panel {
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .status-card {
      padding: 10px 12px;
      min-width: 170px;
    }

    .status-title {
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status-subtitle {
      margin-top: 2px;
      color: var(--ui-muted);
      font-size: 13px;
    }

    .resource-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .resource-chip {
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.05);
    }

    .clock-card {
      padding: 10px 12px;
      text-align: right;
      min-width: 130px;
    }

    .clock-main {
      font-weight: 700;
      font-size: 17px;
    }

    .clock-sub {
      color: var(--ui-muted);
      font-size: 12px;
      margin-top: 2px;
    }

    #toast {
      position: absolute;
      left: 50%;
      bottom: calc(118px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(84vw, 520px);
      padding: 10px 14px;
      text-align: center;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    #toast.visible {
      opacity: 1;
    }

    #interaction-label {
      position: absolute;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      padding: 7px 11px;
      font-size: 13px;
      color: var(--ui-muted);
      opacity: 0;
      transition: opacity 120ms ease;
    }

    #interaction-label.visible {
      opacity: 1;
    }

    .touch-ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #joystick-zone {
      position: absolute;
      left: calc(14px + env(safe-area-inset-left));
      bottom: calc(14px + env(safe-area-inset-bottom));
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background: rgba(16, 26, 23, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.14);
      pointer-events: auto;
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 37px;
      top: 37px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(245, 246, 239, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.24);
      transform: translate(0, 0);
    }

    #action-button,
    #menu-button {
      position: absolute;
      pointer-events: auto;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: var(--ui-text);
      font: inherit;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      touch-action: manipulation;
    }

    #action-button {
      right: calc(20px + env(safe-area-inset-right));
      bottom: calc(24px + env(safe-area-inset-bottom));
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(190, 139, 62, 0.9);
    }

    #action-button:active {
      transform: scale(0.96);
    }

    #menu-button {
      right: calc(20px + env(safe-area-inset-right));
      bottom: calc(128px + env(safe-area-inset-bottom));
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: rgba(17, 29, 25, 0.82);
    }

    #menu {
      position: absolute;
      top: calc(74px + env(safe-area-inset-top));
      right: calc(14px + env(safe-area-inset-right));
      width: min(88vw, 330px);
      padding: 14px;
      pointer-events: auto;
      display: none;
    }

    #menu.open {
      display: block;
    }

    #menu h2 {
      font-size: 17px;
      margin: 0 0 10px;
    }

    #menu p {
      margin: 0 0 12px;
      color: var(--ui-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .menu-button {
      border: 1px solid var(--ui-border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--ui-text);
      padding: 10px;
      font: inherit;
      text-align: left;
    }

    .menu-button small {
      display: block;
      color: var(--ui-muted);
      margin-top: 3px;
    }

    #debug {
      position: absolute;
      left: calc(14px + env(safe-area-inset-left));
      top: calc(110px + env(safe-area-inset-top));
      width: 220px;
      padding: 12px;
      display: none;
      pointer-events: auto;
      font-size: 12px;
    }

    #debug.open {
      display: block;
    }

    #debug label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 10px;
    }

    #debug button,
    #debug input {
      font: inherit;
    }

    #debug button {
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--ui-border);
      color: var(--ui-text);
      background: rgba(255, 255, 255, 0.06);
    }

    @media (max-width: 740px) and (orientation: portrait) {
      #game-shell::after {
        content: "Rotate your phone for the best Readi World experience.";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        background: #13201b;
        color: white;
        z-index: 999;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <canvas id="game" aria-label="Readi World game canvas"></canvas>

    <section class="hud" aria-live="polite">
      <div class="topbar">
        <div class="panel status-card">
          <div class="status-title">Readi World</div>
          <div class="status-subtitle" id="area-name">Village Hub</div>
          <div class="resource-row">
            <span class="resource-chip">🪵 <strong id="wood-count">0</strong></span>
            <span class="resource-chip">🪨 <strong id="stone-count">0</strong></span>
            <span class="resource-chip">🪙 <strong id="coin-count">25</strong></span>
          </div>
        </div>

        <div class="panel clock-card">
          <div class="clock-main" id="phase-name">Morning</div>
          <div class="clock-sub" id="phase-time">Cycle 00:00</div>
        </div>
      </div>

      <div id="interaction-label" class="panel">Interact</div>
      <div id="toast" class="panel"></div>
    </section>

    <section class="touch-ui" aria-label="Mobile controls">
      <div id="joystick-zone" aria-label="Movement joystick">
        <div id="joystick-knob"></div>
      </div>
      <button id="menu-button" type="button" aria-label="Open menu">☰</button>
      <button id="action-button" type="button">ACT</button>
    </section>

    <aside id="menu" class="panel">
      <h2>Village Menu</h2>
      <p>This first build focuses on movement, saving, interaction, time, and a modular world foundation.</p>
      <div class="menu-grid">
        <button class="menu-button" type="button" data-action="save">
          Save now
          <small>Creates a local snapshot</small>
        </button>
        <button class="menu-button" type="button" data-action="debug">
          Debug tools
          <small>Grid, FPS and collision</small>
        </button>
        <button class="menu-button" type="button" data-action="inventory">
          Inventory
          <small>Automatic storage</small>
        </button>
        <button class="menu-button" type="button" data-action="comingSoon">
          Upgrades
          <small>Coming Soon</small>
        </button>
      </div>
    </aside>

    <aside id="debug" class="panel">
      <strong>Debug Tools</strong>
      <div id="debug-stats" style="margin-top:8px;color:var(--ui-muted)"></div>
      <label>Show grid <input id="toggle-grid" type="checkbox" /></label>
      <label>Show collision <input id="toggle-collision" type="checkbox" /></label>
      <label>Show labels <input id="toggle-labels" type="checkbox" checked /></label>
      <button id="regenerate" type="button">Regenerate decorations</button>
      <button id="reset-save" type="button">Reset local save</button>
    </aside>
  </main>

  <script>
    "use strict";

    // ------------------------------------------------------------
    // Readi World v0.0.1
    // Single-file prototype foundation for mobile Safari.
    // ------------------------------------------------------------

    const CONFIG = {
      version: "0.0.1",
      saveKey: "readiWorldSave_v001",
      backupKey: "readiWorldBackup_v001",
      logicalWidth: 1280,
      logicalHeight: 720,
      worldWidth: 1920,
      worldHeight: 1344,
      tileSize: 48,
      playerSpeed: 235,
      interactionRange: 82,
      dayCycleMs: 4 * 60 * 60 * 1000,
      phaseDurationMs: 60 * 60 * 1000,
      autosaveMs: 10000,
      maxPixelRatio: 2
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d", { alpha: false });

    const ui = {
      areaName: document.getElementById("area-name"),
      wood: document.getElementById("wood-count"),
      stone: document.getElementById("stone-count"),
      coin: document.getElementById("coin-count"),
      phaseName: document.getElementById("phase-name"),
      phaseTime: document.getElementById("phase-time"),
      actionButton: document.getElementById("action-button"),
      interactionLabel: document.getElementById("interaction-label"),
      toast: document.getElementById("toast"),
      menu: document.getElementById("menu"),
      menuButton: document.getElementById("menu-button"),
      debug: document.getElementById("debug"),
      debugStats: document.getElementById("debug-stats"),
      toggleGrid: document.getElementById("toggle-grid"),
      toggleCollision: document.getElementById("toggle-collision"),
      toggleLabels: document.getElementById("toggle-labels")
    };

    const state = {
      seed: 481516,
      startedAt: Date.now(),
      lastTimestamp: performance.now(),
      lastSavedAt: Date.now(),
      player: {
        x: 960,
        y: 770,
        radius: 17,
        direction: "down",
        moving: false
      },
      camera: { x: 0, y: 0 },
      input: {
        moveX: 0,
        moveY: 0,
        keys: new Set()
      },
      resources: {
        wood: 0,
        stone: 0,
        coin: 25
      },
      objects: [],
      nearbyObject: null,
      debug: {
        grid: false,
        collision: false,
        labels: true
      },
      fps: 60,
      frameCounter: 0,
      fpsTimer: 0,
      toastTimer: null
    };

    const PHASES = [
      { id: "morning", name: "Morning", overlay: "rgba(255, 218, 153, 0.10)" },
      { id: "day", name: "Day", overlay: "rgba(255, 255, 255, 0.00)" },
      { id: "sunset", name: "Sunset", overlay: "rgba(213, 111, 67, 0.15)" },
      { id: "night", name: "Night", overlay: "rgba(19, 37, 65, 0.35)" }
    ];

    // ------------------------------------------------------------
    // Utility
    // ------------------------------------------------------------

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function seededRandom(seed) {
      let value = seed >>> 0;
      return function next() {
        value += 0x6D2B79F5;
        let t = value;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function showToast(message, duration = 1800) {
      ui.toast.textContent = message;
      ui.toast.classList.add("visible");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => {
        ui.toast.classList.remove("visible");
      }, duration);
    }

    function emitAudioEvent(name, detail = {}) {
      // Future AudioManager hook. No audio files are required in v0.0.1.
      console.debug("[AudioEvent]", name, detail);
    }

    // ------------------------------------------------------------
    // Save system
    // ------------------------------------------------------------

    function createSaveData() {
      return {
        saveVersion: 1,
        gameVersion: CONFIG.version,
        savedAt: Date.now(),
        seed: state.seed,
        player: {
          x: Math.round(state.player.x),
          y: Math.round(state.player.y),
          direction: state.player.direction
        },
        resources: { ...state.resources },
        objectStates: state.objects
          .filter(object => object.persistent)
          .map(object => ({
            id: object.id,
            state: object.state,
            respawnAt: object.respawnAt || null
          }))
      };
    }

    function saveGame(showMessage = false) {
      try {
        const existing = localStorage.getItem(CONFIG.saveKey);
        if (existing) {
          localStorage.setItem(CONFIG.backupKey, existing);
        }
        localStorage.setItem(CONFIG.saveKey, JSON.stringify(createSaveData()));
        state.lastSavedAt = Date.now();
        if (showMessage) showToast("Game saved.");
      } catch (error) {
        console.error("Save failed:", error);
        showToast("Save failed. Storage may be unavailable.");
      }
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(CONFIG.saveKey);
        if (!raw) return false;

        const data = JSON.parse(raw);
        if (!data || typeof data !== "object") return false;

        if (Number.isFinite(data.seed)) state.seed = data.seed;
        if (data.player) {
          state.player.x = clamp(Number(data.player.x) || 960, 70, CONFIG.worldWidth - 70);
          state.player.y = clamp(Number(data.player.y) || 770, 70, CONFIG.worldHeight - 70);
          state.player.direction = data.player.direction || "down";
        }
        if (data.resources) {
          state.resources.wood = Math.max(0, Number(data.resources.wood) || 0);
          state.resources.stone = Math.max(0, Number(data.resources.stone) || 0);
          state.resources.coin = Math.max(0, Number(data.resources.coin) || 0);
        }

        state.loadedObjectStates = new Map(
          Array.isArray(data.objectStates)
            ? data.objectStates.map(item => [item.id, item])
            : []
        );

        return true;
      } catch (error) {
        console.error("Primary save is invalid:", error);
        return loadBackup();
      }
    }

    function loadBackup() {
      try {
        const raw = localStorage.getItem(CONFIG.backupKey);
        if (!raw) return false;
        const data = JSON.parse(raw);
        localStorage.setItem(CONFIG.saveKey, raw);
        showToast("Recovered previous save.");
        return Boolean(data);
      } catch (error) {
        console.error("Backup save is invalid:", error);
        return false;
      }
    }

    // ------------------------------------------------------------
    // World objects and generation
    // ------------------------------------------------------------

    function createObject(config) {
      const object = {
        id: config.id,
        type: config.type,
        subtype: config.subtype || config.type,
        x: config.x,
        y: config.y,
        width: config.width || 48,
        height: config.height || 48,
        collisionRadius: config.collisionRadius || 0,
        interactive: Boolean(config.interactive),
        actionLabel: config.actionLabel || "Interact",
        persistent: Boolean(config.persistent),
        state: config.state || "active",
        layer: config.layer || 1,
        color: config.color || "#888",
        label: config.label || "",
        respawnAt: config.respawnAt || null
      };

      const saved = state.loadedObjectStates?.get(object.id);
      if (saved) {
        object.state = saved.state || object.state;
        object.respawnAt = saved.respawnAt || null;
      }

      return object;
    }

    function generateWorld() {
      state.objects = [];
      const rand = seededRandom(state.seed);

      // Fixed village structures.
      state.objects.push(
        createObject({
          id: "building.home",
          type: "building",
          subtype: "home",
          x: 940,
          y: 540,
          width: 190,
          height: 145,
          collisionRadius: 76,
          interactive: true,
          actionLabel: "Rest",
          persistent: true,
          layer: 2,
          color: "#a76c48",
          label: "Home"
        }),
        createObject({
          id: "building.farm",
          type: "building",
          subtype: "farm",
          x: 520,
          y: 730,
          width: 220,
          height: 150,
          collisionRadius: 70,
          interactive: true,
          actionLabel: "Visit Farm",
          persistent: true,
          layer: 2,
          color: "#b88a55",
          label: "Farm"
        }),
        createObject({
          id: "building.harbor",
          type: "building",
          subtype: "harbor",
          x: 1535,
          y: 675,
          width: 220,
          height: 130,
          collisionRadius: 70,
          interactive: true,
          actionLabel: "Inspect",
          persistent: true,
          layer: 2,
          color: "#8f7660",
          label: "Harbor · Coming Soon"
        }),
        createObject({
          id: "building.mine",
          type: "building",
          subtype: "mine",
          x: 1305,
          y: 260,
          width: 190,
          height: 120,
          collisionRadius: 74,
          interactive: true,
          actionLabel: "Inspect",
          persistent: true,
          layer: 2,
          color: "#66686d",
          label: "Mine · Coming Soon"
        }),
        createObject({
          id: "gate.forest",
          type: "gate",
          subtype: "forest",
          x: 260,
          y: 310,
          width: 120,
          height: 95,
          collisionRadius: 40,
          interactive: true,
          actionLabel: "Enter Forest",
          persistent: true,
          layer: 2,
          color: "#486c43",
          label: "Forest"
        }),
        createObject({
          id: "gate.expedition",
          type: "gate",
          subtype: "expedition",
          x: 1610,
          y: 1080,
          width: 150,
          height: 110,
          collisionRadius: 52,
          interactive: true,
          actionLabel: "Inspect",
          persistent: true,
          layer: 2,
          color: "#715f84",
          label: "Expedition · Coming Soon"
        })
      );

      // Harvestable trees.
      for (let i = 0; i < 28; i++) {
        const x = 130 + rand() * 600;
        const y = 120 + rand() * 1100;
        if (Math.hypot(x - 520, y - 730) < 210) continue;
        if (Math.hypot(x - 260, y - 310) < 160) continue;

        state.objects.push(
          createObject({
            id: `tree.oak.${i}`,
            type: "resource",
            subtype: "tree",
            x,
            y,
            width: 78,
            height: 112,
            collisionRadius: 24,
            interactive: true,
            actionLabel: "Chop",
            persistent: true,
            layer: 3,
            color: i % 3 === 0 ? "#3f7543" : "#4e824c",
            label: "Oak Tree"
          })
        );
      }

      // Decorative stones.
      for (let i = 0; i < 18; i++) {
        state.objects.push(
          createObject({
            id: `stone.decor.${i}`,
            type: "decoration",
            subtype: "stone",
            x: 720 + rand() * 870,
            y: 180 + rand() * 1000,
            width: 34,
            height: 24,
            collisionRadius: 0,
            interactive: false,
            persistent: false,
            layer: 1,
            color: "#777f7b"
          })
        );
      }

      updateRespawns();
    }

    function updateRespawns() {
      const now = Date.now();
      for (const object of state.objects) {
        if (object.state === "harvested" && object.respawnAt && now >= object.respawnAt) {
          object.state = "active";
          object.respawnAt = null;
        }
      }
    }

    // ------------------------------------------------------------
    // Input
    // ------------------------------------------------------------

    const joystick = {
      zone: document.getElementById("joystick-zone"),
      knob: document.getElementById("joystick-knob"),
      pointerId: null,
      centerX: 62,
      centerY: 62,
      radius: 42
    };

    function updateJoystick(clientX, clientY) {
      const rect = joystick.zone.getBoundingClientRect();
      let dx = clientX - rect.left - joystick.centerX;
      let dy = clientY - rect.top - joystick.centerY;
      const length = Math.hypot(dx, dy);

      if (length > joystick.radius) {
        dx = (dx / length) * joystick.radius;
        dy = (dy / length) * joystick.radius;
      }

      joystick.knob.style.transform = `translate(${dx}px, ${dy}px)`;
      state.input.moveX = dx / joystick.radius;
      state.input.moveY = dy / joystick.radius;
    }

    function resetJoystick() {
      joystick.pointerId = null;
      joystick.knob.style.transform = "translate(0, 0)";
      state.input.moveX = 0;
      state.input.moveY = 0;
    }

    joystick.zone.addEventListener("pointerdown", event => {
      joystick.pointerId = event.pointerId;
      joystick.zone.setPointerCapture(event.pointerId);
      updateJoystick(event.clientX, event.clientY);
    });

    joystick.zone.addEventListener("pointermove", event => {
      if (event.pointerId === joystick.pointerId) {
        updateJoystick(event.clientX, event.clientY);
      }
    });

    joystick.zone.addEventListener("pointerup", resetJoystick);
    joystick.zone.addEventListener("pointercancel", resetJoystick);

    window.addEventListener("keydown", event => {
      state.input.keys.add(event.key.toLowerCase());
      if (event.key === " ") {
        event.preventDefault();
        interact();
      }
    });

    window.addEventListener("keyup", event => {
      state.input.keys.delete(event.key.toLowerCase());
    });

    ui.actionButton.addEventListener("click", interact);

    // ------------------------------------------------------------
    // Interaction
    // ------------------------------------------------------------

    function findNearbyObject() {
      let closest = null;
      let closestDistance = Infinity;

      for (const object of state.objects) {
        if (!object.interactive || object.state !== "active") continue;

        const d = distance(state.player, object);
        if (d < CONFIG.interactionRange + object.collisionRadius && d < closestDistance) {
          closest = object;
          closestDistance = d;
        }
      }

      state.nearbyObject = closest;
      ui.actionButton.textContent = closest ? closest.actionLabel.toUpperCase() : "ACT";
      ui.interactionLabel.textContent = closest
        ? `${closest.actionLabel}: ${closest.label || closest.subtype}`
        : "";
      ui.interactionLabel.classList.toggle("visible", Boolean(closest));
    }

    function interact() {
      const object = state.nearbyObject;
      if (!object) {
        showToast("Nothing nearby.");
        return;
      }

      emitAudioEvent("interaction:start", { id: object.id, subtype: object.subtype });

      if (object.subtype === "tree") {
        object.state = "harvested";
        object.respawnAt = Date.now() + 5 * 60 * 1000;
        state.resources.wood += 3;
        showToast("+3 Wood · The tree will regrow.");
        emitAudioEvent("tree:chop", { tool: "starter_axe" });
        saveGame();
        return;
      }

      if (object.subtype === "home") {
        showToast("You feel rested at home.");
        return;
      }

      if (object.subtype === "farm") {
        showToast("Farm systems arrive in a later build.");
        return;
      }

      if (object.subtype === "forest") {
        showToast("Forest Stage 01 will be connected next.");
        return;
      }

      showToast(`${object.label || object.subtype} is Coming Soon.`);
    }

    // ------------------------------------------------------------
    // Collision and movement
    // ------------------------------------------------------------

    function isBlocked(x, y) {
      const margin = 34;
      if (
        x < margin ||
        y < margin ||
        x > CONFIG.worldWidth - margin ||
        y > CONFIG.worldHeight - margin
      ) {
        return true;
      }

      for (const object of state.objects) {
        if (object.state !== "active" || object.collisionRadius <= 0) continue;
        const minDistance = state.player.radius + object.collisionRadius;
        if (Math.hypot(x - object.x, y - object.y) < minDistance) return true;
      }

      return false;
    }

    function updatePlayer(dt) {
      let moveX = state.input.moveX;
      let moveY = state.input.moveY;

      if (state.input.keys.has("a") || state.input.keys.has("arrowleft")) moveX -= 1;
      if (state.input.keys.has("d") || state.input.keys.has("arrowright")) moveX += 1;
      if (state.input.keys.has("w") || state.input.keys.has("arrowup")) moveY -= 1;
      if (state.input.keys.has("s") || state.input.keys.has("arrowdown")) moveY += 1;

      const length = Math.hypot(moveX, moveY);
      state.player.moving = length > 0.05;

      if (length > 1) {
        moveX /= length;
        moveY /= length;
      }

      if (state.player.moving) {
        if (Math.abs(moveX) > Math.abs(moveY)) {
          state.player.direction = moveX > 0 ? "right" : "left";
        } else {
          state.player.direction = moveY > 0 ? "down" : "up";
        }

        const nextX = state.player.x + moveX * CONFIG.playerSpeed * dt;
        const nextY = state.player.y + moveY * CONFIG.playerSpeed * dt;

        if (!isBlocked(nextX, state.player.y)) state.player.x = nextX;
        if (!isBlocked(state.player.x, nextY)) state.player.y = nextY;
      }
    }

    function updateCamera(dt) {
      const targetX = clamp(
        state.player.x - CONFIG.logicalWidth / 2,
        0,
        CONFIG.worldWidth - CONFIG.logicalWidth
      );
      const targetY = clamp(
        state.player.y - CONFIG.logicalHeight / 2,
        0,
        CONFIG.worldHeight - CONFIG.logicalHeight
      );

      const smoothing = 1 - Math.pow(0.001, dt);
      state.camera.x = lerp(state.camera.x, targetX, smoothing);
      state.camera.y = lerp(state.camera.y, targetY, smoothing);
    }

    // ------------------------------------------------------------
    // Time system
    // ------------------------------------------------------------

    function getTimeState() {
      const elapsed = Date.now() - state.startedAt;
      const cycleTime = ((elapsed % CONFIG.dayCycleMs) + CONFIG.dayCycleMs) % CONFIG.dayCycleMs;
      const phaseIndex = Math.floor(cycleTime / CONFIG.phaseDurationMs);
      const phaseProgress = (cycleTime % CONFIG.phaseDurationMs) / CONFIG.phaseDurationMs;

      return {
        elapsed,
        cycleTime,
        phaseIndex,
        phaseProgress,
        phase: PHASES[phaseIndex]
      };
    }

    function updateTimeUI() {
      const time = getTimeState();
      const minutes = Math.floor(time.cycleTime / 60000);
      const hours = Math.floor(minutes / 60);
      const minutePart = String(minutes % 60).padStart(2, "0");

      ui.phaseName.textContent = time.phase.name;
      ui.phaseTime.textContent = `Cycle ${String(hours).padStart(2, "0")}:${minutePart}`;
    }

    // ------------------------------------------------------------
    // Rendering
    // ------------------------------------------------------------

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = Math.min(window.devicePixelRatio || 1, CONFIG.maxPixelRatio);
      canvas.width = Math.max(1, Math.round(rect.width * ratio));
      canvas.height = Math.max(1, Math.round(rect.height * ratio));
    }

    function beginLogicalCanvas() {
      const scaleX = canvas.width / CONFIG.logicalWidth;
      const scaleY = canvas.height / CONFIG.logicalHeight;
      const scale = Math.min(scaleX, scaleY);
      const offsetX = (canvas.width - CONFIG.logicalWidth * scale) / 2;
      const offsetY = (canvas.height - CONFIG.logicalHeight * scale) / 2;

      ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
      return { scale, offsetX, offsetY };
    }

    function drawGround() {
      ctx.fillStyle = "#6d9c62";
      ctx.fillRect(0, 0, CONFIG.logicalWidth, CONFIG.logicalHeight);

      const camX = state.camera.x;
      const camY = state.camera.y;

      // Water at the right edge.
      ctx.fillStyle = "#5a9fb4";
      ctx.fillRect(1450 - camX, 520 - camY, 470, 620);

      // Village roads.
      ctx.lineCap = "round";
      ctx.strokeStyle = "#c9ad79";
      ctx.lineWidth = 58;
      ctx.beginPath();
      ctx.moveTo(250 - camX, 820 - camY);
      ctx.lineTo(960 - camX, 720 - camY);
      ctx.lineTo(1530 - camX, 690 - camY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(960 - camX, 720 - camY);
      ctx.lineTo(1300 - camX, 290 - camY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(960 - camX, 720 - camY);
      ctx.lineTo(1580 - camX, 1080 - camY);
      ctx.stroke();

      // Farm plots.
      ctx.fillStyle = "#8c6545";
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 6; col++) {
          ctx.fillRect(
            355 + col * 44 - camX,
            820 + row * 38 - camY,
            34,
            26
          );
        }
      }
    }

    function drawGrid() {
      if (!state.debug.grid) return;

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.14)";
      ctx.lineWidth = 1;

      const startX = -(state.camera.x % CONFIG.tileSize);
      const startY = -(state.camera.y % CONFIG.tileSize);

      for (let x = startX; x < CONFIG.logicalWidth; x += CONFIG.tileSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CONFIG.logicalHeight);
        ctx.stroke();
      }

      for (let y = startY; y < CONFIG.logicalHeight; y += CONFIG.tileSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CONFIG.logicalWidth, y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawObject(object) {
      if (object.state !== "active") return;

      const x = object.x - state.camera.x;
      const y = object.y - state.camera.y;

      if (x < -220 || y < -220 || x > CONFIG.logicalWidth + 220 || y > CONFIG.logicalHeight + 220) {
        return;
      }

      ctx.save();

      if (object.type === "building" || object.type === "gate") {
        ctx.fillStyle = object.color;
        ctx.fillRect(
          x - object.width / 2,
          y - object.height,
          object.width,
          object.height
        );

        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fillRect(
          x - object.width / 2 + 12,
          y - object.height + 12,
          object.width - 24,
          14
        );

        ctx.fillStyle = "#3d2f25";
        ctx.fillRect(x - 17, y - 48, 34, 48);
      } else if (object.subtype === "tree") {
        ctx.fillStyle = "#76513b";
        ctx.fillRect(x - 11, y - 50, 22, 50);

        ctx.fillStyle = object.color;
        ctx.beginPath();
        ctx.arc(x, y - 82, 42, 0, Math.PI * 2);
        ctx.arc(x - 26, y - 70, 28, 0, Math.PI * 2);
        ctx.arc(x + 28, y - 68, 30, 0, Math.PI * 2);
        ctx.fill();
      } else if (object.subtype === "stone") {
        ctx.fillStyle = object.color;
        ctx.beginPath();
        ctx.ellipse(x, y - 8, 18, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      if (state.debug.labels && object.label) {
        ctx.font = "13px -apple-system, sans-serif";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.66)";
        ctx.fillRect(x - 88, y + 12, 176, 24);
        ctx.fillStyle = "#fff";
        ctx.fillText(object.label, x, y + 29);
      }

      if (state.debug.collision && object.collisionRadius > 0) {
        ctx.strokeStyle = "#ffdf57";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, object.collisionRadius, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPlayer() {
      const x = state.player.x - state.camera.x;
      const y = state.player.y - state.camera.y;

      ctx.save();

      // Shadow layer.
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.beginPath();
      ctx.ellipse(x, y + 5, 22, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body layer.
      ctx.fillStyle = "#dfad78";
      ctx.beginPath();
      ctx.arc(x, y - 38, 16, 0, Math.PI * 2);
      ctx.fill();

      // Clothing layer.
      ctx.fillStyle = "#376e73";
      ctx.fillRect(x - 14, y - 24, 28, 31);

      // Hair layer.
      ctx.fillStyle = "#4b3429";
      ctx.beginPath();
      ctx.arc(x, y - 43, 16, Math.PI, Math.PI * 2);
      ctx.fill();

      // Direction indicator.
      ctx.strokeStyle = "#f7e6bb";
      ctx.lineWidth = 3;
      ctx.beginPath();
      if (state.player.direction === "up") {
        ctx.moveTo(x, y - 58);
        ctx.lineTo(x, y - 68);
      } else if (state.player.direction === "down") {
        ctx.moveTo(x, y + 5);
        ctx.lineTo(x, y + 16);
      } else if (state.player.direction === "left") {
        ctx.moveTo(x - 16, y - 30);
        ctx.lineTo(x - 27, y - 30);
      } else {
        ctx.moveTo(x + 16, y - 30);
        ctx.lineTo(x + 27, y - 30);
      }
      ctx.stroke();

      if (state.debug.collision) {
        ctx.strokeStyle = "#ff6b6b";
        ctx.beginPath();
        ctx.arc(x, y, state.player.radius, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawLighting() {
      const time = getTimeState();
      ctx.fillStyle = time.phase.overlay;
      ctx.fillRect(0, 0, CONFIG.logicalWidth, CONFIG.logicalHeight);

      if (time.phase.id === "night") {
        const playerX = state.player.x - state.camera.x;
        const playerY = state.player.y - state.camera.y;

        const gradient = ctx.createRadialGradient(
          playerX,
          playerY - 20,
          40,
          playerX,
          playerY - 20,
          260
        );
        gradient.addColorStop(0, "rgba(255, 223, 154, 0.16)");
        gradient.addColorStop(1, "rgba(255, 223, 154, 0)");

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, CONFIG.logicalWidth, CONFIG.logicalHeight);
      }
    }

    function render() {
      beginLogicalCanvas();
      drawGround();
      drawGrid();

      const ordered = state.objects
        .filter(object => object.state === "active")
        .sort((a, b) => {
          if (a.layer !== b.layer) return a.layer - b.layer;
          return a.y - b.y;
        });

      for (const object of ordered) {
        if (object.y < state.player.y) drawObject(object);
      }

      drawPlayer();

      for (const object of ordered) {
        if (object.y >= state.player.y) drawObject(object);
      }

      drawLighting();
    }

    // ------------------------------------------------------------
    // Main loop
    // ------------------------------------------------------------

    function update(dt) {
      updateRespawns();
      updatePlayer(dt);
      updateCamera(dt);
      findNearbyObject();
      updateTimeUI();

      ui.wood.textContent = state.resources.wood;
      ui.stone.textContent = state.resources.stone;
      ui.coin.textContent = state.resources.coin;

      state.frameCounter += 1;
      state.fpsTimer += dt;
      if (state.fpsTimer >= 0.5) {
        state.fps = Math.round(state.frameCounter / state.fpsTimer);
        state.frameCounter = 0;
        state.fpsTimer = 0;
      }

      ui.debugStats.innerHTML = [
        `FPS: ${state.fps}`,
        `Seed: ${state.seed}`,
        `Player: ${Math.round(state.player.x)}, ${Math.round(state.player.y)}`,
        `Objects: ${state.objects.length}`,
        `Last save: ${Math.round((Date.now() - state.lastSavedAt) / 1000)}s ago`
      ].join("<br>");
    }

    function gameLoop(timestamp) {
      const dt = Math.min(0.05, (timestamp - state.lastTimestamp) / 1000);
      state.lastTimestamp = timestamp;

      update(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    // ------------------------------------------------------------
    // UI wiring
    // ------------------------------------------------------------

    ui.menuButton.addEventListener("click", () => {
      ui.menu.classList.toggle("open");
    });

    ui.menu.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;
      if (action === "save") saveGame(true);
      if (action === "debug") ui.debug.classList.toggle("open");
      if (action === "inventory") showToast("Resources are stored automatically.");
      if (action === "comingSoon") showToast("Village upgrades are Coming Soon.");
    });

    ui.toggleGrid.addEventListener("change", () => {
      state.debug.grid = ui.toggleGrid.checked;
    });

    ui.toggleCollision.addEventListener("change", () => {
      state.debug.collision = ui.toggleCollision.checked;
    });

    ui.toggleLabels.addEventListener("change", () => {
      state.debug.labels = ui.toggleLabels.checked;
    });

    document.getElementById("regenerate").addEventListener("click", () => {
      state.seed += 1;
      generateWorld();
      showToast(`World regenerated with seed ${state.seed}.`);
      saveGame();
    });

    document.getElementById("reset-save").addEventListener("click", () => {
      localStorage.removeItem(CONFIG.saveKey);
      localStorage.removeItem(CONFIG.backupKey);
      location.reload();
    });

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) saveGame();
    });

    window.addEventListener("pagehide", () => saveGame());

    setInterval(() => saveGame(), CONFIG.autosaveMs);

    // ------------------------------------------------------------
    // Boot
    // ------------------------------------------------------------

    function boot() {
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;

      document.documentElement.dataset.displayMode =
        isStandalone ? "standalone" : "browser";

      const loaded = loadGame();
      generateWorld();
      resizeCanvas();
      state.camera.x = clamp(
        state.player.x - CONFIG.logicalWidth / 2,
        0,
        CONFIG.worldWidth - CONFIG.logicalWidth
      );
      state.camera.y = clamp(
        state.player.y - CONFIG.logicalHeight / 2,
        0,
        CONFIG.worldHeight - CONFIG.logicalHeight
      );

      showToast(
        loaded
          ? "Welcome back to Readi World."
          : "Welcome to Readi World v0.0.1."
      );

      requestAnimationFrame(gameLoop);
    }

    boot();
  </script>
</body>
</html>
