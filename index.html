"use strict";

const state={manifest:null,layout:null,registry:null,buildingDefs:null,forestModule:null,localization:null,resourceDefs:null,atlases:{},world:{width:1344,height:1920},player:{x:672,y:930},camera:{x:0,y:0},resources:{wood:0,stone:0,coin:25},input:{active:false,id:null,sx:0,sy:0,x:0,y:0,lastMove:0},forestNodes:[],harvest:null,context:null,timeAnchor:Date.now(),last:performance.now(),toastTimer:null};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const debugState={visible:true,missingSprites:new Set()};

  console.groupCollapsed(`[Readi World assets] ${report.loaded}/${report.total} modules loaded`);
  console.info("Loaded modules:",loadedIds.length?loadedIds:"none");
  console.info("Required modules:",report.required);
  if(missingRequired.length)console.error("Missing required modules:",missingRequired);

function toast(t){ui.toast.textContent=t;ui.toast.classList.add("show");clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>ui.toast.classList.remove("show"),1300)}
function save(){localStorage.setItem(CONFIG.SAVE,JSON.stringify({player:state.player,resources:state.resources,timeAnchor:state.timeAnchor}))}
function loadSave(){try{const d=JSON.parse(localStorage.getItem(CONFIG.SAVE));if(d){Object.assign(state.player,d.player||{});Object.assign(state.resources,d.resources||{});state.timeAnchor=d.timeAnchor||Date.now()}}catch{}}
async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw Error(`${u}: ${r.status}`);return r.json()}
function getImage(u){return new Promise((ok,no)=>{const im=new Image();im.crossOrigin="anonymous";im.onload=()=>ok(im);im.onerror=()=>no(Error(`Image failed: ${u}`));im.src=u})}
function t(key,fallback=""){
  return state.localization?.ui?.[key]||fallback||key;
}
const foundation=window.ReadiWorldFoundation?.createContractRuntime({state,getJSON,getImage,t,assetCache:ASSET_CACHE});
if(!foundation)throw Error("ReadiWorldFoundation unavailable");
const {assertRequiredAssets,findSprite,getAssetReport,getSpritesByRole,loadReadyAtlases,loadRuntimeContracts,pickSpriteByRole,summarizeRuntimeContracts}=foundation;
function validForestModule(v){
  return !!(v&&v.nodeTypes&&v.lootTables&&Array.isArray(v.spawnRules)&&v.spawnRules.length);
}
function getForestNodeType(nodeOrTypeId){
  const typeId=typeof nodeOrTypeId==="string"?nodeOrTypeId:nodeOrTypeId?.typeId;
  return state.forestModule?.nodeTypes?.[typeId]||null;
}
function pickForestSpriteId(nodeType){
  if(!nodeType)return null;
  return pickSpriteByRole(nodeType.role,nodeType.tags||[])||nodeType.spriteId||null;
}
function pointInPolygon(x,y,polygon){
  let inside=false;
  for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
    const a=polygon[i],b=polygon[j];
    const crosses=((a.y>y)!==(b.y>y))&&(x<(b.x-a.x)*(y-a.y)/((b.y-a.y)||Number.EPSILON)+a.x);
    if(crosses)inside=!inside;
  }
  return inside;
}
function distanceToSegment(x,y,a,b){
  const dx=b.x-a.x,dy=b.y-a.y;
  const lengthSq=dx*dx+dy*dy;
  if(!lengthSq)return Math.hypot(x-a.x,y-a.y);
  const t=clamp(((x-a.x)*dx+(y-a.y)*dy)/lengthSq,0,1);
  return Math.hypot(x-(a.x+t*dx),y-(a.y+t*dy));
}
function overlapsWater(x,y,padding=0){
  return (state.layout.water||[]).some(area=>{
    const polygon=area.polygon||[];
    if(polygon.length<3)return false;
    if(pointInPolygon(x,y,polygon))return true;
    if(padding<=0)return false;
    return polygon.some((point,index)=>distanceToSegment(x,y,point,polygon[(index+1)%polygon.length])<padding);
  });
}
function buildForestNodes(){
  state.forestNodes=[];
  for(const rule of state.forestModule.spawnRules){
    const typeIds=rule.nodeTypes||[];
    if(!typeIds.length)continue;
    for(let i=0;i<rule.count;i++){
      const typeId=typeIds[i%typeIds.length];
      const nodeType=getForestNodeType(typeId);
      if(!nodeType)continue;
      const x=rule.origin.x+((i*rule.step.x)%rule.bounds.width);
      const y=rule.origin.y+((i*rule.step.y)%rule.bounds.height);
      const clearPadding=(rule.clearRadiusPadding||0)+(nodeType.fallbackShape==="bush"?24:38);
      if(overlapsWater(x,y,clearPadding))continue;
      if(state.layout.buildings.some(building=>Math.hypot(x-building.position.x,y-building.position.y)<(building.clearRadius||140)+(rule.clearRadiusPadding||0)))continue;
      state.forestNodes.push({
        id:`${rule.id}.${i}`,
        typeId,
        x,
        y,
        active:true,
        respawnAt:0,
        spriteId:pickForestSpriteId(nodeType),
        stumpSpriteId:nodeType.stumpSpriteId||""
      });
    }
  }
}
function hashString(value){
  let hash=0;
  const text=String(value||"");
  for(let i=0;i<text.length;i++)hash=(hash*31+text.charCodeAt(i))>>>0;
  return hash;
}
function resolveForestLoot(node){
  const nodeType=getForestNodeType(node);
  const tableId=nodeType?.lootTableId;
  const table=tableId?state.forestModule?.lootTables?.[tableId]:null;
  if(!table?.drops?.length)return [];
  return table.drops.flatMap(drop=>{
    const chance=drop.chance??1;
    const roll=(hashString(`${node.id}:${drop.resourceKey}`)%1000)/1000;
    if(roll>chance)return [];
    const min=drop.amountMin??1,max=drop.amountMax??min;
    const amount=min+(hashString(`${node.id}:${drop.variantId||drop.resourceKey}:amount`)%(Math.max(1,max-min+1)));
    return [{resourceKey:drop.resourceKey,variantId:drop.variantId||null,amount}];
  });
}
function applyForestLoot(drops){
  for(const drop of drops){
    if(typeof state.resources[drop.resourceKey]!=="number")state.resources[drop.resourceKey]=0;
    state.resources[drop.resourceKey]+=drop.amount;
  }
}
function getResourceLabel(resourceKey){
  const resource=state.resourceDefs?.resources?.[resourceKey];
  return resource?`${resource.icon||""} ${resource.name}`.trim():resourceKey;
}
function resize(){const r=app.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,CONFIG.DPR);canvas.width=Math.max(1,Math.round(r.width*d));canvas.height=Math.max(1,Math.round(r.height*d))}
function logical(){const sx=canvas.width/CONFIG.LW,sy=canvas.height/CONFIG.LH,s=Math.min(sx,sy);ctx.setTransform(s,0,0,s,(canvas.width-CONFIG.LW*s)/2,(canvas.height-CONFIG.LH*s)/2)}
function classifyFallbackKind(id){
  const key=String(id||"").toLowerCase();
  if(!key)return "generic";
  if(key.includes("stump"))return "stump";
  if(key.includes("bush")||key.includes("shrub"))return "bush";
  if(key.includes("tree")||key.includes("oak")||key.includes("pine"))return "tree";
  if(key.includes("axe")||key.includes("pick")||key.includes("rod")||key.includes("tool"))return "tool";
  if(key.includes("effect")||key.includes("impact")||key.includes("hit")||key.includes("dust")||key.includes("spark")||key.includes("ring")||key.includes("shadow"))return "effect";
  if(key.includes("well")||key.includes("mine")||key.includes("harbor")||key.includes("farm")||key.includes("forester")||key.includes("home")||key.includes("house")||key.includes("hut")||key.includes("building")||key.includes("village"))return "building";
  return "generic";
}
function drawBuildingFallback(id,x,y){
  ctx.save();
  const key=String(id||"").toLowerCase();
  const well=key.includes("well"),mine=key.includes("mine"),harbor=key.includes("harbor"),farm=key.includes("farm"),forester=key.includes("forester");
  if(well){
    ctx.fillStyle="#777";
    ctx.beginPath();ctx.arc(x,y-25,45,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#65452f";ctx.fillRect(x-48,y-80,10,70);ctx.fillRect(x+38,y-80,10,70);
    ctx.fillStyle="#9c5937";ctx.beginPath();ctx.moveTo(x-60,y-80);ctx.lineTo(x,y-115);ctx.lineTo(x+60,y-80);ctx.closePath();ctx.fill();
  }else if(harbor){
    ctx.fillStyle="#8f6945";ctx.fillRect(x-90,y-80,180,80);
    ctx.fillStyle="#325b6f";ctx.beginPath();ctx.moveTo(x-105,y-80);ctx.lineTo(x,y-145);ctx.lineTo(x+105,y-80);ctx.closePath();ctx.fill();
    ctx.fillStyle="#6d4d31";ctx.fillRect(x-120,y,240,14);ctx.fillRect(x-95,y,12,45);ctx.fillRect(x+83,y,12,45);
  }else{
    ctx.fillStyle=mine?"#766d62":forester?"#9a6a3e":farm?"#c09058":"#b47c4b";
    ctx.fillRect(x-80,y-110,160,110);
    ctx.fillStyle=mine?"#59524b":forester?"#6d4c2f":farm?"#8f6b37":"#9c5937";
    ctx.beginPath();ctx.moveTo(x-95,y-110);ctx.lineTo(x,y-170);ctx.lineTo(x+95,y-110);ctx.closePath();ctx.fill();
    ctx.fillStyle="#4d3428";ctx.fillRect(x-16,y-48,32,48);

}
function drawTreeFallbackAt(x,y,seed=0){
  ctx.save();
  ctx.fillStyle="#76523d";ctx.fillRect(x-7,y-28,14,38);
  ctx.fillStyle=seed%2?"#4d7d43":"#5c8b50";
  ctx.beginPath();ctx.arc(x,y-52,30,0,Math.PI*2);ctx.arc(x-22,y-40,22,0,Math.PI*2);ctx.arc(x+22,y-40,22,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawBushFallbackAt(x,y){
  ctx.save();
  ctx.fillStyle="#4d7d43";
  ctx.beginPath();ctx.arc(x,y-22,24,0,Math.PI*2);ctx.arc(x-18,y-18,18,0,Math.PI*2);ctx.arc(x+16,y-18,16,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawStumpFallbackAt(x,y){
  ctx.save();

function drawToolFallback(id,x,y){
  const key=String(id||"").toLowerCase();

  ctx.beginPath();

    ctx.strokeStyle="#3e2f21";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,8);ctx.quadraticCurveTo(18,-12,10,-46);ctx.stroke();
  }else if(key.includes("pick")){
    ctx.moveTo(-16,-26);ctx.lineTo(16,-26);ctx.lineTo(10,-36);ctx.lineTo(-10,-36);ctx.closePath();ctx.fill();

function drawEffectFallback(id,x,y){

function drawFallback(id,x,y){

function drawSprite(id,x,y,overrideSize=null){

function drawGroundTexture(){

  const tile=190;

  const startWorldY=Math.floor(state.camera.y/tile)*tile;
  for(let wy=startWorldY-tile;wy<state.camera.y+CONFIG.LH+tile;wy+=tile){
    for(let wx=startWorldX-tile;wx<state.camera.x+CONFIG.LW+tile;wx+=tile){
      drawTileCell(grassSpriteId,wx-state.camera.x,wy-state.camera.y,tile+2,tile+2,.52);
    }
  }
  return true;
}
function drawWaterTexture(poly){

  ctx.beginPath();
  poly.forEach((q,i)=>i?ctx.lineTo(q.x-state.camera.x,q.y-state.camera.y):ctx.moveTo(q.x-state.camera.x,q.y-state.camera.y));

      drawTileCell(waterSpriteId,x,y,tile+2,tile+2,.48);
    }
  }
  ctx.restore();
}

function drawGround(){
  ctx.fillStyle="#78a068";
  ctx.fillRect(0,0,CONFIG.LW,CONFIG.LH);
  drawGroundTexture();
  const cx=state.camera.x,cy=state.camera.y;

  for(const p of state.layout.paths){
    ctx.strokeStyle="#cfb274";
    ctx.lineWidth=p.width;
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.beginPath();
    p.points.forEach((q,i)=>i?ctx.lineTo(q.x-cx,q.y-cy):ctx.moveTo(q.x-cx,q.y-cy));
    ctx.stroke();

    ctx.save();
    ctx.globalAlpha=.16;
    ctx.strokeStyle="#8b663a";
    ctx.lineWidth=Math.max(2,p.width*.16);
    ctx.setLineDash([10,18]);
    ctx.stroke();
    ctx.restore();
  }

  for(const w of state.layout.water){
    ctx.fillStyle="#5c9fb0";
    ctx.beginPath();
    w.polygon.forEach((q,i)=>i?ctx.lineTo(q.x-cx,q.y-cy):ctx.moveTo(q.x-cx,q.y-cy));
    ctx.closePath();
    ctx.fill();

}
function drawForestNodeFallback(node,x,y){
  const nodeType=getForestNodeType(node);
  if(!node.active&&nodeType?.harvestable)return drawStumpFallbackAt(x,y);
  if(nodeType?.fallbackShape==="bush")return drawBushFallbackAt(x,y);
  return drawTreeFallbackAt(x,y,hashString(node.id));
}
function drawForestNodes(){
  for(const node of state.forestNodes){
    const nodeType=getForestNodeType(node);
    if(!nodeType)continue;
    if(!node.active&&node.respawnAt&&node.respawnAt<Date.now()){node.active=true;node.respawnAt=0}
    const x=node.x-state.camera.x,y=node.y-state.camera.y;
    if(x<-180||x>900||y<-220||y>1450)continue;
    if(node.active){
      if(!node.spriteId||!drawSprite(node.spriteId,x,y))drawForestNodeFallback(node,x,y);
      continue;
    }
    const hasStumpSprite=node.stumpSpriteId&&findSprite(node.stumpSpriteId);
    if(hasStumpSprite)drawSprite(node.stumpSpriteId,x,y);
    else drawForestNodeFallback(node,x,y);
  }
}
function drawBuildings(){for(const b of [...state.layout.buildings].sort((a,b)=>a.position.y-b.position.y))drawSprite(b.spriteId,b.position.x-state.camera.x,b.position.y-state.camera.y)}
function drawPlayer(){const x=state.player.x-state.camera.x,y=state.player.y-state.camera.y;ctx.fillStyle="rgba(0,0,0,.2)";ctx.beginPath();ctx.ellipse(x,y+5,22,9,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#3f7880";ctx.fillRect(x-14,y-34,28,30);ctx.fillStyle="#d9a36f";ctx.beginPath();ctx.arc(x,y-49,16,0,Math.PI*2);ctx.fill();ctx.fillStyle="#4b3326";ctx.beginPath();ctx.arc(x,y-54,16,Math.PI,Math.PI*2);ctx.fill()}
function drawHarvestAnimation(){
  if(!state.harvest)return;
  const x=state.player.x-state.camera.x,y=state.player.y-state.camera.y;
  const tx=state.harvest.node.x-state.camera.x,ty=state.harvest.node.y-state.camera.y;
  const elapsed=performance.now()-state.harvest.start;
  const p=Math.min(1,elapsed/850);
  const swing=Math.sin(p*Math.PI*4)*.65-.25;

  const axeSwingSpriteId=pickSpriteByRole("tool_overlay",["axe","swing"])||"axe_swing";
  const usedTool=drawOptionalSprite(axeSwingSpriteId,x+20,y-34,[82,82],[.25,.82],1,swing);
  if(!usedTool){
    ctx.save();
    ctx.translate(x+14,y-36);
    ctx.rotate(swing);
    ctx.strokeStyle="#6f4a2f";
    ctx.lineWidth=5;
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(0,-34);
    ctx.stroke();
    ctx.fillStyle="#b9c0c4";
    ctx.beginPath();
    ctx.moveTo(-10,-38);
    ctx.lineTo(12,-45);
    ctx.lineTo(14,-31);
    ctx.lineTo(-8,-28);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  const hitPulse=.65+.35*Math.sin(p*Math.PI*8)**2;
  const woodHitSpriteId=pickSpriteByRole("impact_effect",["wood"])||"wood_hit";
  drawOptionalSprite(woodHitSpriteId,tx,ty-48,[92,92],[.5,.5],hitPulse,0);

  ctx.strokeStyle="rgba(255,255,255,.92)";
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.arc(x,y+18,28,-Math.PI/2,-Math.PI/2+p*Math.PI*2);
  ctx.stroke();
}
function clock(){const e=Date.now()-state.timeAnchor,c=((e%CONFIG.DAY)+CONFIG.DAY)%CONFIG.DAY,k=Math.floor(c/CONFIG.PHASE),m=Math.floor((c%CONFIG.PHASE)/CONFIG.PHASE*360),h=(phases[k].h+Math.floor(m/60))%24;return{p:phases[k],d:Math.floor(e/CONFIG.DAY)+1,h,m:m%60}}
function render(){
  logical();
  drawGround();
  drawForestNodes();
  drawBuildings();
  drawPlayer();

  if(!state.harvest&&!state.input.active&&nearestHarvestNode()){
    const x=state.player.x-state.camera.x,y=state.player.y-state.camera.y;
    const axeIdleSpriteId=pickSpriteByRole("tool_overlay",["axe","idle"])||"axe_idle";
    drawOptionalSprite(axeIdleSpriteId,x+18,y-28,[58,58],[.3,.82],.88,-.18);
  }

  drawHarvestAnimation();
  const t=clock();
  ctx.fillStyle=t.p.o;
  ctx.fillRect(0,0,CONFIG.LW,CONFIG.LH);

function insideBuilding(x,y){return state.layout.buildings.some(b=>Math.hypot(x-b.position.x,y-b.position.y)<(b.collisionRadius||60)+18)}
function recoverIfStuck(){if(!insideBuilding(state.player.x,state.player.y))return;const s=state.layout.playerSpawn;state.player.x=s.x;state.player.y=s.y;toast(t("status.position_recovered","Position recovered"))}
function blocked(x,y){return x<25||y<25||x>state.world.width-25||y>state.world.height-25||insideBuilding(x,y)}
function nearestHarvestNode(){let best=null,d=1e9;for(const node of state.forestNodes){const nodeType=getForestNodeType(node);if(!node.active||!nodeType?.harvestable)continue;const range=nodeType.interactionRange||CONFIG.HARVEST;const n=Math.hypot(state.player.x-node.x,state.player.y-node.y);if(n<range&&n<d){best=node;d=n}}return best}
function harvestUpdate(){if(state.input.active||Math.hypot(state.input.x,state.input.y)>.05){state.harvest=null;return}if(state.harvest){const nodeType=getForestNodeType(state.harvest.node);const duration=nodeType?.harvestDurationMs||850;if(performance.now()-state.harvest.start>duration){state.harvest.node.active=false;state.harvest.node.respawnAt=Date.now()+(nodeType?.respawnMs||300000);const drops=resolveForestLoot(state.harvest.node);applyForestLoot(drops);const primaryDrop=drops[0];state.harvest=null;if(primaryDrop)toast(`+${primaryDrop.amount} ${getResourceLabel(primaryDrop.resourceKey)}`);else toast(t("status.forage_unavailable","Nothing harvestable nearby"));save()}return}if(performance.now()-state.input.lastMove>350){const node=nearestHarvestNode();if(node){state.harvest={node,start:performance.now()};toast(t("status.chopping","Chopping..."))}}}
function update(dt){let ix=state.input.x,iy=state.input.y,l=Math.hypot(ix,iy);if(l>1){ix/=l;iy/=l}if(l>.04){state.harvest=null;const dx=ix*CONFIG.SPEED*dt,dy=iy*CONFIG.SPEED*dt;const nx=state.player.x+dx,ny=state.player.y+dy;if(!blocked(nx,state.player.y))state.player.x=nx;if(!blocked(state.player.x,ny))state.player.y=ny}else harvestUpdate();const tx=clamp(state.player.x-CONFIG.LW/2,0,state.world.width-CONFIG.LW),ty=clamp(state.player.y-CONFIG.LH/2,0,state.world.height-CONFIG.LH);state.camera.x+=(tx-state.camera.x)*Math.min(1,dt*9);state.camera.y+=(ty-state.camera.y)*Math.min(1,dt*9);let best=null,bd=1e9;for(const b of state.layout.buildings){const d=Math.hypot(state.player.x-b.interactionPoint.x,state.player.y-b.interactionPoint.y);if(d<CONFIG.INTERACT&&d<bd){best=b;bd=d}}state.context=best;ui.prompt.textContent=best?.interactionLabel||"";ui.prompt.classList.toggle("show",!!best);const t=clock();ui.phase.textContent=`${t.p.i} ${t.p.n}`;ui.clock.textContent=`Day ${t.d} · ${String(t.h).padStart(2,"0")}:${String(t.m).padStart(2,"0")}`;ui.wood.textContent=state.resources.wood;ui.stone.textContent=state.resources.stone;ui.coin.textContent=state.resources.coin;ui.debug.textContent=`INPUT ${ix.toFixed(2)} ${iy.toFixed(2)} | PLAYER ${state.player.x.toFixed(0)} ${state.player.y.toFixed(0)} | ${state.input.active?"ACTIVE":"IDLE"} | ${Object.keys(state.atlases).length} ATLAS | ${debugState.missingSprites.size} MISS`}
function loop(n){const dt=Math.min(.05,(n-state.last)/1000);state.last=n;update(dt);render();requestAnimationFrame(loop)}
function startJoy(x,y,id){if(state.input.active)return;state.input.active=true;state.input.id=id;state.input.sx=x;state.input.sy=y;state.input.x=0;state.input.y=0;state.input.lastMove=performance.now();ui.joy.style.left=`${clamp(x-59,4,innerWidth-122)}px`;ui.joy.style.top=`${clamp(y-59,120,innerHeight-122)}px`;ui.joy.classList.add("show")}
function moveJoy(x,y,id){if(!state.input.active||id!==state.input.id)return;let dx=x-state.input.sx,dy=y-state.input.sy,l=Math.hypot(dx,dy),r=42;if(l>r){dx=dx/l*r;dy=dy/l*r}state.input.x=dx/r;state.input.y=dy/r;state.input.lastMove=performance.now();ui.knob.style.transform=`translate(${dx}px,${dy}px)`}
function endJoy(id){if(!state.input.active||id!==state.input.id)return;state.input.active=false;state.input.id=null;state.input.x=0;state.input.y=0;state.input.lastMove=performance.now();ui.joy.classList.remove("show");ui.knob.style.transform="translate(0,0)"}
app.addEventListener("touchstart",e=>{if(e.target.closest("button"))return;const t=e.changedTouches[0];if(!t)return;startJoy(t.clientX,t.clientY,t.identifier);e.preventDefault()},{passive:false,capture:true});
window.addEventListener("touchmove",e=>{for(const t of e.changedTouches)if(t.identifier===state.input.id){moveJoy(t.clientX,t.clientY,t.identifier);e.preventDefault();break}},{passive:false,capture:true});
window.addEventListener("touchend",e=>{for(const t of e.changedTouches)if(t.identifier===state.input.id)endJoy(t.identifier)},{passive:false,capture:true});
window.addEventListener("touchcancel",e=>{for(const t of e.changedTouches)if(t.identifier===state.input.id)endJoy(t.identifier)},{passive:false,capture:true});
app.addEventListener("pointerdown",e=>{if(e.pointerType==="touch"||e.target.closest("button"))return;startJoy(e.clientX,e.clientY,e.pointerId)},{capture:true});window.addEventListener("pointermove",e=>{if(e.pointerType!=="touch")moveJoy(e.clientX,e.clientY,e.pointerId)});window.addEventListener("pointerup",e=>{if(e.pointerType!=="touch")endJoy(e.pointerId)});window.addEventListener("pointercancel",e=>{if(e.pointerType!=="touch")endJoy(e.pointerId)});
ui.menu.onclick=()=>ui.panel.classList.toggle("open");ui.prompt.onclick=()=>state.context&&toast(`${state.context.interactionLabel} · ${t("status.coming_soon","Coming Soon")}`);ui.panel.onclick=e=>{const button=e.target.closest("[data-a]");const a=button?.dataset.a;if(!a)return;if(a==="save"){save();toast(t("status.saved","Game saved"))}else if(a==="debug"){debugState.visible=!debugState.visible;ui.debug.classList.toggle("hidden",!debugState.visible);button.textContent=debugState.visible?"Hide debug":"Show debug";toast(debugState.visible?"Debug visible":"Debug hidden")}else toast(`${a} · ${t("status.coming_soon","Coming Soon")}`)};document.addEventListener("visibilitychange",()=>document.hidden&&save());window.addEventListener("resize",resize);
async function boot(){
  loadSave();
  await loadRuntimeContracts(PATHS);
  const forestModule=await getJSON(PATHS.forest);
  if(!validForestModule(forestModule))throw Error("Invalid forest_module.json");
  state.forestModule=forestModule;
  await loadReadyAtlases();
  const report=assertRequiredAssets();
  const runtimeSummary=summarizeRuntimeContracts();
  if(!localStorage.getItem(CONFIG.SAVE)){
    state.player.x=state.layout.playerSpawn.x;
    state.player.y=state.layout.playerSpawn.y;
  }
  recoverIfStuck();
  buildForestNodes();
  resize();
  ui.loading.classList.add("hidden");
  if(!state.atlases.village_buildings)toast("Building fallback active");
  const missingVisual=Object.entries(state.manifest.modules)
    .filter(([,m])=>m?.enabled&&m?.file)
    .map(([id])=>id)
    .filter(id=>!state.atlases[id]);
  if(missingVisual.length)console.warn("Optional visual atlases missing:",missingVisual);
  const manifestOnly=Object.keys(state.manifest.modules).filter(id=>!state.registry.atlases[id]);
  if(manifestOnly.length)console.warn("Manifest modules missing from registry:",manifestOnly);
  logAssetReport(report,runtimeSummary);
  requestAnimationFrame(loop);
}
boot().catch(e=>{console.error(e);ui.loading.textContent=`${t("status.load_failed","Game load failed")}: ${e.message}`});
